<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L1 Test-Time Scaling: Best-of-N with ASP Verification</title>
<style>
:root {
  --bg: #0d1117; --fg: #c9d1d9; --card: #161b22; --border: #30363d;
  --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922;
  --purple: #bc8cff; --cyan: #39d353; --orange: #db8b0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
       background: var(--bg); color: var(--fg); line-height: 1.6; padding: 20px; }
.container { max-width: 1300px; margin: 0 auto; }
h1 { color: var(--accent); font-size: 1.8em; margin-bottom: 4px; }
h2 { color: var(--purple); font-size: 1.3em; margin: 28px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
h3 { color: var(--cyan); font-size: 1.05em; margin: 16px 0 8px; }
.subtitle { color: #8b949e; font-size: 0.92em; margin-bottom: 20px; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Summary */
.summary-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
.summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; flex: 1; min-width: 130px; }
.summary-card .label { color: #8b949e; font-size: 0.82em; }
.summary-card .value { font-size: 1.7em; font-weight: 600; }
.value.green { color: var(--green); } .value.red { color: var(--red); } .value.yellow { color: var(--yellow); }

/* Tabs */
.tabs { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
.tab { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 5px 13px; cursor: pointer; font-size: 0.88em; transition: 0.15s; }
.tab:hover { border-color: var(--accent); }
.tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
.tab.disabled { opacity: 0.35; cursor: default; }
.logic-tabs .tab.active { background: var(--purple); border-color: var(--purple); }

/* Example card */
.example { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin: 14px 0; }
.problem { background: #1c2333; border-radius: 6px; padding: 11px 15px; margin: 8px 0; font-size: 0.88em; border-left: 3px solid var(--accent); }
.badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.82em; font-weight: 600; }
.badge-yes { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-no { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-selected { background: rgba(63,185,80,0.2); color: var(--green); border: 1px solid var(--green); }

/* Completion grid */
.comp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 8px; margin: 12px 0; }
.comp-tile { background: #1c2333; border: 2px solid var(--border); border-radius: 8px; padding: 10px; cursor: pointer; transition: 0.15s; position: relative; text-align: center; }
.comp-tile:hover { border-color: var(--accent); transform: translateY(-1px); }
.comp-tile.selected { border-color: var(--green); box-shadow: 0 0 12px rgba(63,185,80,0.25); }
.comp-tile.active-view { border-color: var(--accent); background: #22293a; }
.comp-tile .idx { font-weight: 700; color: var(--accent); font-size: 0.85em; }
.comp-tile .ans { font-size: 1.3em; font-weight: 700; margin: 4px 0; }
.comp-tile .ans.correct { color: var(--green); }
.comp-tile .ans.wrong { color: var(--red); }
.comp-tile .ans.none { color: #8b949e; }
.comp-tile .asp { font-size: 0.95em; font-weight: 600; }
.comp-tile .asp.pos { color: var(--green); }
.comp-tile .asp.neg { color: var(--red); }
.comp-tile .asp.zero { color: var(--yellow); }
.comp-tile .meta { font-size: 0.75em; color: #8b949e; margin-top: 4px; }
.comp-tile .loop-tag { background: rgba(248,81,73,0.2); color: var(--red); padding: 1px 5px; border-radius: 3px; font-size: 0.7em; font-weight: 600; }
.sel-badge { position: absolute; top: -7px; right: 8px; background: var(--green); color: var(--bg); padding: 1px 7px; border-radius: 4px; font-size: 0.7em; font-weight: 700; }

/* Trace viewer */
.trace-viewer { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 12px 0; display: none; }
.trace-viewer.visible { display: block; }
.trace-header { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; font-size: 0.88em; }
.trace-header .th-item { }
.trace-header .th-label { color: #8b949e; }
.trace-header .th-val { font-weight: 600; }

/* Step rendering */
.step { border-left: 3px solid var(--border); margin: 6px 0; padding: 4px 0 4px 12px; font-size: 0.85em; }
.step.premise { border-left-color: var(--accent); }
.step.derived { border-left-color: var(--purple); }
.step.derived.repeated { border-left-color: var(--red); opacity: 0.6; }
.step-head { display: flex; align-items: center; gap: 8px; }
.step-tag { font-size: 0.75em; font-weight: 700; padding: 1px 6px; border-radius: 3px; }
.step-tag.premise { background: rgba(88,166,255,0.15); color: var(--accent); }
.step-tag.derived { background: rgba(188,140,255,0.15); color: var(--purple); }
.step-num { color: #8b949e; font-size: 0.85em; }
.step-from { color: var(--cyan); font-size: 0.8em; }
.step-logic { font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace; color: var(--yellow); margin: 2px 0; padding: 3px 6px; background: rgba(210,153,34,0.08); border-radius: 3px; display: inline-block; }
.step-text { color: #8b949e; font-style: italic; font-size: 0.92em; }

/* Raw output toggle */
.raw-toggle { color: var(--accent); cursor: pointer; font-size: 0.85em; margin-top: 8px; }
.raw-box { display: none; white-space: pre-wrap; font-family: monospace; font-size: 0.8em; max-height: 350px; overflow-y: auto; background: var(--card); padding: 10px; border-radius: 4px; margin-top: 6px; }
.raw-box.visible { display: block; }

/* Ranking table */
.rank-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.83em; }
.rank-table th { text-align: left; padding: 7px 10px; border-bottom: 2px solid var(--border); color: var(--accent); font-size: 0.9em; }
.rank-table td { padding: 5px 10px; border-bottom: 1px solid #21262d; }
.rank-table tr.sel { background: rgba(63,185,80,0.08); }
.rank-table tr.sel td:first-child { font-weight: 700; color: var(--green); }
.rank-table .loop-cell { color: var(--red); font-weight: 600; }

/* Full trace rendering */
.full-trace { max-height: 600px; overflow-y: auto; padding: 8px 0; font-size: 0.9em; }

.loading { text-align: center; padding: 50px; color: #8b949e; }
.none-msg { color: #8b949e; padding: 30px; text-align: center; font-style: italic; }
</style>
</head>
<body>
<div class="container">
  <h1>L1 Test-Time Scaling: Best-of-N with ASP Verification</h1>
  <p class="subtitle">
    Generate N reasoning traces per problem. Verify each step with ASP (Answer Set Programming).
    Rank by logical validity. Select the best verified chain.
  </p>

  <div class="tabs logic-tabs" id="ltTabs"></div>
  <div class="summary-row" id="summary"></div>
  <h2>Inference Types</h2>
  <div class="tabs" id="thTabs"></div>
  <div id="examples"></div>
  <div class="loading" id="loading">Loading data...</div>
</div>

<script>
const FILES = {
  propositional_logic: 'bon_demo_propositional_logic_data.json',
  first_order_logic: 'bon_demo_first_order_logic_data.json',
  nm_logic: 'bon_demo_nm_logic_data.json',
};
const LT_LABELS = {
  propositional_logic: 'Propositional Logic',
  first_order_logic: 'First-Order Logic',
  nm_logic: 'Non-Monotonic',
};

let DB = {}, curLT = null, curTH = null;

async function init() {
  for (const [lt, f] of Object.entries(FILES)) {
    try { const r = await fetch(f); if (r.ok) DB[lt] = await r.json(); } catch(e) {}
  }
  document.getElementById('loading').style.display = 'none';
  if (!Object.keys(DB).length) { document.getElementById('examples').innerHTML = '<div class="none-msg">No data files found yet. L1 demo jobs are still running.</div>'; return; }
  renderLTTabs();
  pickLT(Object.keys(DB)[0]);
}

function renderLTTabs() {
  const c = document.getElementById('ltTabs'); c.innerHTML = '';
  for (const lt of Object.keys(FILES)) {
    const t = document.createElement('div');
    t.className = 'tab' + (DB[lt] ? '' : ' disabled');
    t.textContent = LT_LABELS[lt];
    t.dataset.lt = lt;
    if (DB[lt]) t.onclick = () => pickLT(lt);
    c.appendChild(t);
  }
}

function pickLT(lt) {
  curLT = lt;
  document.querySelectorAll('#ltTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.lt === lt));
  const d = DB[lt], s = d.summary || {};
  const n = d.metadata?.n || 8;
  const bonPct = s.total_examples ? Math.round(s.bon_correct/s.total_examples*100) : '?';
  const grePct = s.total_examples ? Math.round(s.greedy_correct/s.total_examples*100) : '?';
  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="label">Model</div><div class="value" style="font-size:1em;color:var(--accent)">${esc(d.metadata?.model||'?')}</div></div>
    <div class="summary-card"><div class="label">Examples</div><div class="value">${s.total_examples||'?'}</div></div>
    <div class="summary-card"><div class="label">Greedy (#1)</div><div class="value yellow">${grePct}%</div></div>
    <div class="summary-card"><div class="label">BoN-${n} + ASP</div><div class="value green">${bonPct}%</div></div>`;
  const thC = document.getElementById('thTabs'); thC.innerHTML = '';
  for (const th of Object.keys(d.theories)) {
    const t = document.createElement('div');
    t.className = 'tab'; t.textContent = th.replace(/_/g, ' '); t.dataset.th = th;
    t.onclick = () => pickTH(th); thC.appendChild(t);
  }
  pickTH(Object.keys(d.theories)[0]);
}

function pickTH(th) {
  curTH = th;
  document.querySelectorAll('#thTabs .tab').forEach(t => t.classList.toggle('active', t.dataset.th === th));
  renderExamples(DB[curLT].theories[th]);
}

function renderExamples(exs) {
  const c = document.getElementById('examples'); c.innerHTML = '';
  exs.forEach((ex, ei) => {
    const gt = ex.ground_truth, sel = ex.completions[ex.selected_index];
    const gtCls = gt === 'yes' ? 'badge-yes' : 'badge-no';
    const selCls = ex.selected_correct ? 'badge-yes' : 'badge-no';
    const div = document.createElement('div'); div.className = 'example';
    div.innerHTML = `
      <h3>Example ${ei+1}
        <span class="badge ${gtCls}">GT: ${gt}</span>
        <span class="badge ${selCls}">BoN: ${ex.selected_answer} ${ex.selected_correct?'&#10003;':'&#10007;'}</span>
        <span style="color:#8b949e;font-size:0.8em;margin-left:8px">${ex.generation_time||'?'}s</span>
      </h3>
      <div class="problem"><b>Context:</b> ${esc(ex.context.substring(0,500))}${ex.context.length>500?'...':''}<br><br><b>Question:</b> ${esc(ex.question)}</div>
      <h3>8 Reasoning Traces <span style="color:#8b949e;font-size:0.8em">(click to inspect)</span></h3>
      <div class="comp-grid" id="cg_${ei}"></div>
      <div class="trace-viewer" id="tv_${ei}"></div>
      <h3>ASP Ranking</h3>
      <table class="rank-table" id="rt_${ei}"></table>`;
    c.appendChild(div);
    renderGrid(ei, ex);
    renderRank(ei, ex);
  });
}

function renderGrid(ei, ex) {
  const g = document.getElementById('cg_'+ei); g.innerHTML = '';
  ex.completions.forEach((comp, ci) => {
    const isSel = ci === ex.selected_index;
    const ans = comp.answer || 'N/A';
    const correct = comp.correct;
    const aspCls = comp.asp_consistency > 0 ? 'pos' : (comp.asp_consistency < 0 ? 'neg' : 'zero');
    const ansCls = !comp.has_answer ? 'none' : (correct ? 'correct' : 'wrong');
    const t = document.createElement('div');
    t.className = 'comp-tile' + (isSel ? ' selected' : '');
    t.id = `ct_${ei}_${ci}`;
    t.onclick = () => showTrace(ei, ex, ci);
    t.innerHTML = `${isSel ? '<div class="sel-badge">SELECTED</div>' : ''}
      <div class="idx">#${ci+1}</div>
      <div class="ans ${ansCls}">${ans}</div>
      <div class="asp ${aspCls}">${comp.asp_consistency>=0?'+':''}${comp.asp_consistency.toFixed(3)}</div>
      <div class="meta">${comp.num_steps} steps${comp.has_loop?' <span class="loop-tag">LOOP x'+comp.max_repeats+'</span>':''}</div>`;
    g.appendChild(t);
  });
}

function showTrace(ei, ex, ci) {
  // Highlight active tile
  document.querySelectorAll(`#cg_${ei} .comp-tile`).forEach(t => t.classList.remove('active-view'));
  document.getElementById(`ct_${ei}_${ci}`).classList.add('active-view');

  const comp = ex.completions[ci], tv = document.getElementById('tv_'+ei);
  const aspCls = comp.asp_consistency > 0 ? 'color:var(--green)' : (comp.asp_consistency < 0 ? 'color:var(--red)' : 'color:var(--yellow)');
  const ansCls = comp.correct ? 'color:var(--green)' : 'color:var(--red)';

  // Render the full raw text with step tags highlighted inline
  const rendered = renderFullTrace(comp.text);

  tv.innerHTML = `
    <div class="trace-header">
      <div class="th-item"><span class="th-label">Completion</span> <span class="th-val">#${ci+1}</span></div>
      <div class="th-item"><span class="th-label">Answer</span> <span class="th-val" style="${ansCls}">${comp.answer||'N/A'} ${comp.correct?'&#10003;':'&#10007;'}</span></div>
      <div class="th-item"><span class="th-label">ASP</span> <span class="th-val" style="${aspCls}">${comp.asp_consistency>=0?'+':''}${comp.asp_consistency.toFixed(3)}</span></div>
      <div class="th-item"><span class="th-label">Steps</span> <span class="th-val">${comp.num_steps}</span></div>
      <div class="th-item"><span class="th-label">Unique derived</span> <span class="th-val">${comp.unique_derived}</span></div>
      <div class="th-item"><span class="th-label">Max repeats</span> <span class="th-val" style="${comp.has_loop?'color:var(--red)':''}">${comp.max_repeats}${comp.has_loop?' (LOOP)':''}</span></div>
    </div>
    <div class="full-trace">${rendered}</div>`;
  tv.classList.add('visible');
}

function renderRank(ei, ex) {
  const t = document.getElementById('rt_'+ei);
  const ranked = ex.completions.map((c,i) => ({...c, oi:i})).sort((a,b) => {
    const av = a.has_answer&&!a.has_loop?2:(a.has_answer?1:0);
    const bv = b.has_answer&&!b.has_loop?2:(b.has_answer?1:0);
    if (av!==bv) return bv-av;
    if (a.asp_consistency!==b.asp_consistency) return b.asp_consistency-a.asp_consistency;
    return a.num_steps-b.num_steps;
  });
  let h = `<thead><tr><th>Rank</th><th>#</th><th>Answer</th><th></th><th>ASP</th><th>Steps</th><th>Unique</th><th>Repeats</th><th></th></tr></thead><tbody>`;
  ranked.forEach((c,r) => {
    const isSel = c.oi === ex.selected_index;
    const aspSt = c.asp_consistency>0?'color:var(--green)':(c.asp_consistency<0?'color:var(--red)':'color:var(--yellow)');
    const status = isSel ? '<b style="color:var(--green)">&#10140; SELECTED</b>' : (c.has_loop ? '<span class="loop-cell">loop</span>' : (!c.has_answer ? '<span style="color:#8b949e">no answer</span>' : ''));
    h += `<tr class="${isSel?'sel':''}">
      <td>${r+1}</td><td>#${c.oi+1}</td>
      <td>${c.answer||'N/A'}</td>
      <td style="color:${c.correct?'var(--green)':'var(--red)'}">${c.correct?'&#10003;':'&#10007;'}</td>
      <td style="${aspSt};font-weight:600">${c.asp_consistency>=0?'+':''}${c.asp_consistency.toFixed(3)}</td>
      <td>${c.num_steps}</td><td>${c.unique_derived}</td>
      <td${c.has_loop?' class="loop-cell"':''}>${c.max_repeats}</td>
      <td>${status}</td></tr>`;
  });
  t.innerHTML = h + '</tbody>';
}

function renderFullTrace(rawText) {
  // Render full model output with step tags highlighted inline.
  // Free text between steps is shown as regular reasoning prose.
  if (!rawText) return '<span style="color:#8b949e">No output</span>';

  let text = rawText;
  // Strip outer <think> wrapper if present (keep contents)
  text = text.replace(/^<think>\s*/i, '').replace(/\s*<\/think>\s*$/i, '');

  // Track repeated logic expressions
  const logicSeen = {};

  // Replace <step ...>...</step> blocks with styled HTML
  text = text.replace(/<step\s+([^>]*)>([\s\S]*?)<\/step>/gi, (match, attrs, body) => {
    // Parse attributes
    const nMatch = attrs.match(/n="(\d+)"/);
    const typeMatch = attrs.match(/type="(\w+)"/);
    const fromMatch = attrs.match(/from="([^"]+)"/);
    const stepN = nMatch ? nMatch[1] : '?';
    const stepType = typeMatch ? typeMatch[1] : 'derived';
    const stepFrom = fromMatch ? fromMatch[1] : '';
    const isPrem = stepType === 'premise';

    // Extract <text> and <logic> sub-tags
    const textMatch = body.match(/<text>([\s\S]*?)<\/text>/i);
    const logicMatch = body.match(/<logic>([\s\S]*?)<\/logic>/i);
    const stepText = textMatch ? textMatch[1].trim() : '';
    const stepLogic = logicMatch ? logicMatch[1].trim() : '';

    // Detect repetition
    let repeated = false;
    if (!isPrem && stepLogic) {
      const key = stepLogic.trim().toLowerCase();
      logicSeen[key] = (logicSeen[key] || 0) + 1;
      if (logicSeen[key] > 1) repeated = true;
    }

    const borderColor = isPrem ? 'var(--accent)' : (repeated ? 'var(--red)' : 'var(--purple)');
    const tagCls = isPrem ? 'premise' : 'derived';
    const opacity = repeated ? 'opacity:0.5;' : '';
    const fromHtml = stepFrom ? ` <span class="step-from">from ${esc(stepFrom)}</span>` : '';
    const repBadge = repeated ? ' <span class="loop-tag">repeated</span>' : '';

    return `<div class="step-block" style="border-left:3px solid ${borderColor};${opacity}margin:10px 0;padding:6px 12px;border-radius:0 6px 6px 0;background:rgba(22,27,34,0.8);">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <span class="step-tag ${tagCls}">${isPrem?'P':'D'}</span>
        <span style="color:#8b949e;font-size:0.85em;">Step ${esc(stepN)}</span>
        ${fromHtml}${repBadge}
      </div>
      ${stepText ? `<div style="color:var(--fg);font-size:0.9em;margin:3px 0;">${esc(stepText)}</div>` : ''}
      ${stepLogic ? `<div class="step-logic">${esc(stepLogic)}</div>` : ''}
    </div>`;
  });

  // Escape remaining free text (non-step content) but preserve our injected HTML
  // Strategy: split on our injected divs, escape the gaps, rejoin
  const parts = text.split(/(<div class="step-block"[\s\S]*?<\/div>\s*<\/div>)/);
  const rendered = parts.map(part => {
    if (part.startsWith('<div class="step-block"')) return part; // already HTML
    // This is free text — escape and style it
    const escaped = esc(part).trim();
    if (!escaped) return '';
    return `<div style="color:#9eaab6;font-size:0.88em;margin:6px 0;line-height:1.6;">${escaped}</div>`;
  }).join('');

  return rendered;
}

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

init();
</script>
</body>
</html>
